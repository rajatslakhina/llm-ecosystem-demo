<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 780" font-family="'SF Mono', Menlo, Consolas, monospace">
  <rect x="0" y="0" width="980" height="780" rx="10" fill="#0d1117"/>
  <rect x="0" y="0" width="980" height="34" rx="10" fill="#161b22"/>
  <rect x="0" y="24" width="980" height="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="17" r="6" fill="#27c93f"/>
  <text x="490" y="21" text-anchor="middle" font-size="12" fill="#8b949e">llm-ecosystem-demo &#8212; swift run LLMEcosystemDemo</text>

  <g font-size="12.5" fill="#c9d1d9">
    <text x="20" y="60"><tspan fill="#58a6ff">$</tspan> swift run LLMEcosystemDemo</text>
    <text x="20" y="86" fill="#7ee787">== LLM Ecosystem Integration Demo ==</text>
    <text x="20" y="106" fill="#8b949e">ProviderGatewayKit (routing) + StructuredOutputKit (decoding) + TokenMeterKit (cost) +</text>
    <text x="20" y="124" fill="#8b949e">ResponseCacheKit (caching) + ToolRegistryKit (tool dispatch) + AgentLoopKit (agent loop)</text>

    <text x="20" y="156"><tspan fill="#d2a8ff">[on-device provider, clean JSON]</tspan> routed via on-device &#8594; decoded:</text>
    <text x="20" y="176">&#160;&#160;WeatherReport(city: "Bengaluru", temperatureCelsius: 27.5, conditions: "cloudy")</text>
    <text x="20" y="204"><tspan fill="#d2a8ff">[cloud provider, JSON fenced in prose]</tspan> routed via cloud &#8594; decoded:</text>
    <text x="20" y="224">&#160;&#160;WeatherReport(city: "Mumbai", temperatureCelsius: 31.0, conditions: "storm")</text>
    <text x="20" y="252"><tspan fill="#d2a8ff">[self-hosted provider, self-repairing]</tspan> decoded after a repair round-trip:</text>
    <text x="20" y="272">&#160;&#160;WeatherReport(city: "Chennai", temperatureCelsius: 33.2, conditions: "clear")</text>

    <text x="20" y="300"><tspan fill="#d2a8ff">[cached scenario]</tspan> attempt 1: <tspan fill="#f0883e">MISS</tspan> &#8212; routed via cloud, decoded:</text>
    <text x="20" y="320">&#160;&#160;WeatherReport(city: "Pune", temperatureCelsius: 24.0, conditions: "clear")</text>
    <text x="20" y="340"><tspan fill="#d2a8ff">[cached scenario]</tspan> attempt 2: <tspan fill="#7ee787">HIT</tspan> &#8212; no provider call, no additional cost</text>
    <text x="20" y="360" fill="#8b949e">Cache: 1 hit / 1 miss, hit rate 50.0%, saved $0.001272</text>

    <text x="20" y="392"><tspan fill="#d2a8ff">[tool-calling round trip]</tspan> dispatched "get_weather", final answer:</text>
    <text x="20" y="412">&#160;&#160;ToolBackedAnswer(city: "Denver", conditions: "Clear", tempF: 68.0)</text>
    <text x="20" y="432" fill="#8b949e">ToolRegistry stats: totalCalls=1 success=1 failures=0</text>

    <text x="20" y="464"><tspan fill="#d2a8ff">[AgentLoopKit orchestrated loop]</tspan> 3 steps, halted: finalAnswer,</text>
    <text x="20" y="484">&#160;&#160;answer: Austin is warmer than Boston right now.</text>

    <text x="20" y="518" fill="#c9d1d9">Model&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;Prompt&#160;&#160;&#160;Completion&#160;&#160;&#160;Total&#160;&#160;&#160;&#160;&#160;Cost(USD)</text>
    <text x="20" y="534" fill="#57606a">-----------------------------------------------------------------------</text>
    <text x="20" y="554">cloud&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;277&#160;&#160;&#160;&#160;&#160;&#160;78&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;355&#160;&#160;&#160;&#160;&#160;&#160;$0.002001</text>
    <text x="20" y="574">on-device&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;82&#160;&#160;&#160;&#160;&#160;&#160;&#160;18&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;100&#160;&#160;&#160;&#160;&#160;&#160;$0</text>
    <text x="20" y="594">self-hosted&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;97&#160;&#160;&#160;&#160;&#160;&#160;&#160;65&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;162&#160;&#160;&#160;&#160;&#160;&#160;$0.000357</text>
    <text x="20" y="610" fill="#57606a">-----------------------------------------------------------------------</text>
    <text x="20" y="630" font-weight="bold" fill="#7ee787">TOTAL&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;456&#160;&#160;&#160;&#160;&#160;&#160;161&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;&#160;617&#160;&#160;&#160;&#160;&#160;&#160;$0.002358</text>

    <text x="20" y="666" fill="#7ee787">Total metered cost across all six routed scenarios: $0.002358</text>
    <text x="20" y="692" fill="#58a6ff">$<tspan fill="#c9d1d9"> </tspan><tspan fill="#8b949e">&#9615;</tspan></text>
  </g>
</svg>
